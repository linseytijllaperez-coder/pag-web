<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Segundo Bimestre</title>
    <link rel="stylesheet" href="bim.css">
</head>
<body>

<header>
    <h1>Segundo Bimestre - DPW 207</h1>
</header>

<section class="contenedor">
    <div class="ejercicios">

        <div class="card">
            <h3>Ejercicio 1</h3>
            <p>DIVISIÓN</p>
            <button class="boton" onclick="mostrarDivision()">Ver ejercicio</button>
        </div>

        <div class="card">
            <h3>Ejercicio 2</h3>
            <p>PROMEDIO</p>
            <button class="boton" onclick="mostrarPromedio()">Ver ejercicio</button>
        </div>

        <div class="card">
            <h3>Ejercicio 3</h3>
            <p>POTENCIA</p>
            <button class="boton" onclick="mostrarPotencia()">Ver ejercicio</button>
        </div>

        <div class="card">
            <h3>Ejercicio 4</h3>
            <p>RAÍZ CUADRADA</p>
            <button class="boton" onclick="mostrarRaiz()">Ver ejercicio</button>
        </div>

    </div>
</section>

<section id="zonaEjercicio"></section>

<script>

function mostrarDivision(){
    document.getElementById("zonaEjercicio").innerHTML = `
        <h2>División</h2>
        <input type="number" id="n1">
        <input type="number" id="n2">
        <button onclick="calcularDivision()">Calcular</button>
        <p id="resultado"></p>
    `;
}

function calcularDivision(){
    let a = Number(document.getElementById("n1").value);
    let b = Number(document.getElementById("n2").value);
    document.getElementById("resultado").innerText =
        b === 0 ? "No se puede dividir entre 0" : "Resultado: " + (a/b);
}

function mostrarPromedio(){
    document.getElementById("zonaEjercicio").innerHTML = `
        <h2>Promedio</h2>
        <input type="number" id="a">
        <input type="number" id="b">
        <input type="number" id="c">
        <button onclick="calcularPromedio()">Calcular</button>
        <p id="resultado"></p>
    `;
}

function calcularPromedio(){
    let a = Number(document.getElementById("a").value);
    let b = Number(document.getElementById("b").value);
    let c = Number(document.getElementById("c").value);
    document.getElementById("resultado").innerText = "Promedio: " + ((a+b+c)/3);
}

function mostrarPotencia(){
    document.getElementById("zonaEjercicio").innerHTML = `
        <h2>Potencia</h2>
        <input type="number" id="base">
        <input type="number" id="expo">
        <button onclick="calcularPotencia()">Calcular</button>
        <p id="resultado"></p>
    `;
}

function calcularPotencia(){
    let b = Number(document.getElementById("base").value);
    let e = Number(document.getElementById("expo").value);
    document.getElementById("resultado").innerText = "Resultado: " + (b ** e);
}

function mostrarRaiz(){
    document.getElementById("zonaEjercicio").innerHTML = `
        <h2>Raíz Cuadrada</h2>
        <input type="number" id="numero">
        <button onclick="calcularRaiz()">Calcular</button>
        <p id="resultado"></p>
    `;
}

function calcularRaiz(){
    let n = Number(document.getElementById("numero").value);
    document.getElementById("resultado").innerText =
        n < 0 ? "No existe raíz real" : "Resultado: " + Math.sqrt(n);
}

</script>

<footer>
    <a href="Prac1.html">Volver al inicio</a>
</footer>

</body>
</html>
