<h2>División</h2>
<div class="contenedor">
    <input type="number" id="d1" placeholder="Número 1">
    <input type="number" id="d2" placeholder="Número 2">
    <button onclick="dividir()">Dividir</button>
    <p class="resultado" id="resDiv"></p>
</div>

<script>
function dividir(){
    let a = Number(document.getElementById("d1").value);
    let b = Number(document.getElementById("d2").value);

    if(b === 0){
        document.getElementById("resDiv").innerText = "No se puede dividir entre 0";
    } else {
        document.getElementById("resDiv").innerText = "Resultado: " + (a / b);
    }
}
</script>

<h2>Número Mayor</h2>

    <input type="number" id="n1" placeholder="Número 1">
    <input type="number" id="n2" placeholder="Número 2">
    <input type="number" id="n3" placeholder="Número 3">
    <button onclick="mayor()">Calcular</button>
    <p class="resultado" id="resMayor"></p>
</div>

<script>
function mayor(){
    let a = Number(document.getElementById("n1").value);

}

    let c = Number(document.getElementById("celsius").value);

}

<bim4 class="html">
    <div class="contenedor">
      <!-- contenido -->
       <h2>Par o Impar</h2>
<div class="contenedor">
    <input type="number" id="numero">
    <button onclick="verificar()">Verificar</button>
    <p class="resultado" id="resPar"></p>
</div>

<script>
function verificar(){
    let n = Number(document.getElementById("numero").value);
    if(n % 2 === 0){
        document.getElementById("resPar").innerText = "Es número PAR";
    } else {
        document.getElementById("resPar").innerText = "Es número IMPAR";
    }
}
</script>

<h2>Tabla de Multiplicar</h2>
<div class="contenedor">
    <input type="number" id="tabla">
    <button onclick="mostrarTabla()">Mostrar</button>
    <ul id="resultadoTabla"></ul>
</div>

<script>
function mostrarTabla(){
    let n = Number(document.getElementById("tabla").value);
    let lista = document.getElementById("resultadoTabla");
    lista.innerHTML = "";
    for(let i=1; i<=10; i++){
        let li = document.createElement("li");
        li.textContent = n + " x " + i + " = " + (n*i);
        lista.appendChild(li);
    }
}
</script>

<h2>Factorial</h2>
<div class="contenedor">
    <input type="number" id="fact">
    <button onclick="factorial()">Calcular</button>
    <p class="resultado" id="resFact"></p>
</div>

<script>
function factorial(){
    let n = Number(document.getElementById("fact").value);
    let resultado = 1;

    for(let i=1; i<=n; i++){
        resultado *= i;
    }

    document.getElementById("resFact").innerText = "Resultado: " + resultado;
}
</script>

<h2>Calculadora Completa</h2>
<div class="contenedor">
    <input type="number" id="a">
    <input type="number" id="b">

    <select id="operacion">
        <option value="+">Sumar</option>
        <option value="-">Restar</option>
        <option value="*">Multiplicar</option>
        <option value="/">Dividir</option>
    </select>

    <button onclick="calcular()">Calcular</button>
    <p class="resultado" id="resFinal"></p>
</div>

<script>
function calcular(){
    let a = Number(document.getElementById("a").value);
    let b = Number(document.getElementById("b").value);
    let op = document.getElementById("operacion").value;
    let resultado;

    if(op === "+") resultado = a + b;
    if(op === "-") resultado = a - b;
    if(op === "*") resultado = a * b;
    if(op === "/") resultado = b !== 0 ? a / b : "No se puede dividir entre 0";

    document.getElementById("resFinal").innerText = "Resultado: " + resultado;
}
</script>
    </div>
</bim4>
